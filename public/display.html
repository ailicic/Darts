<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darts – Big Screen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 2rem;
      background: #16213e;
      border-bottom: 2px solid #e94560;
    }

    .header-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: #e94560;
    }

    #turn-indicator {
      font-size: 1.1rem;
      color: #a0d0ff;
    }

    #game-over-banner {
      display: none;
      background: #e94560;
      color: #fff;
      text-align: center;
      padding: 1rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .scoreboard-wrapper {
      flex: 1;
      overflow-x: auto;
      padding: 1.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      text-align: center;
      padding: 0.65rem 0.9rem;
      border: 1px solid #2a2a5a;
    }

    thead th {
      background: #16213e;
      color: #a0a0d0;
      font-size: 1rem;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead th.player-header {
      color: #e0e0ff;
      font-size: 1.05rem;
    }

    .target-col {
      background: #12122a;
      color: #c0c0e0;
      font-weight: 700;
      font-size: 1.1rem;
      width: 80px;
    }

    td.marks-cell {
      font-size: 1.6rem;
      letter-spacing: 2px;
      min-width: 100px;
    }

    td.marks-cell.closed {
      background: rgba(100, 230, 100, 0.08);
      color: #80ff80;
    }

    tr.score-row td {
      background: #16213e;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 0.85rem;
    }

    tr.score-row .score-value {
      color: #e94560;
    }

    tr.score-row .score-label {
      color: #a0a0d0;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .current-turn-badge {
      display: inline-block;
      background: #e94560;
      color: #fff;
      border-radius: 6px;
      padding: 0.1rem 0.5rem;
      font-size: 0.75rem;
      vertical-align: middle;
      margin-left: 0.4rem;
    }

    /* Recent throws feed */
    .feed-panel {
      background: #16213e;
      border-top: 2px solid #2a2a5a;
      padding: 0.8rem 2rem;
      font-size: 0.95rem;
    }

    .feed-panel h3 {
      color: #a0a0d0;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    #throw-feed {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .throw-chip {
      display: inline-flex;
      align-items: center;
      background: #0f3460;
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.9rem;
      color: #eee;
    }

    .throw-chip.miss {
      background: #3a1a1a;
      color: #e94560;
    }

    .throw-chip.score {
      background: #0a3a1a;
      color: #80ff80;
    }

    .connecting {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-size: 1.5rem;
      color: #a0a0d0;
    }

    /* ── QR Panel ──────────────────────────────────────────────────────────── */
    #qr-panel {
      position: fixed;
      bottom: 80px; /* above the feed panel */
      right: 1.5rem;
      background: #16213e;
      border: 2px solid #2a2a5a;
      border-radius: 16px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      z-index: 10;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      transition: opacity 0.3s;
    }

    #qr-panel.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #qr-panel .qr-label {
      color: #a0a0d0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    #qr-panel .qr-title {
      color: #e0e0ff;
      font-size: 0.9rem;
      font-weight: 700;
      text-align: center;
    }

    #qr-img {
      width: 160px;
      height: 160px;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qr-img svg {
      width: 160px;
      height: 160px;
    }

    #qr-panel .qr-url {
      color: #666;
      font-size: 0.7rem;
      text-align: center;
      word-break: break-all;
      max-width: 160px;
    }

    #btn-toggle-qr {
      position: fixed;
      bottom: 80px;
      right: 1.5rem;
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 1.3rem;
      cursor: pointer;
      display: none; /* shown after QR loaded */
      align-items: center;
      justify-content: center;
      color: #eee;
      z-index: 11;
      transition: background 0.15s;
    }

    #btn-toggle-qr.qr-visible {
      display: none; /* only show toggle after QR panel is hidden */
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">🎯 DARTS – CUT THROAT</div>
  <div id="turn-indicator">Loading…</div>
</header>

<div id="game-over-banner"></div>

<!-- QR code panel – shown in corner so players can scan to join -->
<div id="qr-panel">
  <div class="qr-title">📱 Scan to Join</div>
  <div id="qr-img"><span style="color:#555;font-size:0.8rem">Loading…</span></div>
  <div class="qr-label">Point your phone camera here</div>
  <div class="qr-url" id="qr-url"></div>
</div>

<div id="main-content">
  <div class="connecting" id="connecting-msg">Connecting to game…</div>
</div>

<div class="feed-panel">
  <h3>Recent Throws</h3>
  <div id="throw-feed"><span style="color:#555">—</span></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const gameId = location.pathname.split('/')[2];
  const socket = io();

  socket.emit('joinGame', { gameId });

  socket.on('gameUpdate', (state) => {
    renderGame(state);
  });

  // Also fetch initial state via REST in case socket is slow
  fetch(`/api/games/${gameId}`)
    .then(r => r.json())
    .then(renderGame)
    .catch(() => {});

  // ── QR Code ───────────────────────────────────────────────────────────────
  let qrLoaded = false;

  function loadQR() {
    if (qrLoaded) return;
    fetch(`/api/games/${gameId}/join-qr`)
      .then(r => {
        if (!r.ok) throw new Error('QR not available');
        return r.text();
      })
      .then(svg => {
        qrLoaded = true;
        const container = document.getElementById('qr-img');
        container.innerHTML = svg;

        // Show the join URL beneath the QR code
        const joinUrl = `${location.origin}/join/${gameId}`;
        document.getElementById('qr-url').textContent = joinUrl;
      })
      .catch(() => {
        document.getElementById('qr-img').innerHTML =
          '<span style="color:#e94560;font-size:0.75rem;padding:4px;">QR unavailable</span>';
      });
  }

  loadQR();

  let gameOverRedirectTimer = null;

  function renderGame(state) {
    document.getElementById('connecting-msg')?.remove();

    // Game over banner
    const banner = document.getElementById('game-over-banner');
    if (state.gameOver) {
      const winner = state.players.find(p => p.id === state.winnerId);
      banner.style.display = 'block';
      banner.textContent = winner ? `🏆 ${winner.name} WINS!` : '🏆 Game Over!';
      document.getElementById('turn-indicator').textContent = 'Game Over';
      // Hide QR panel once game is over
      document.getElementById('qr-panel').classList.add('hidden');

      if (!gameOverRedirectTimer) {
        let secs = 30;
        gameOverRedirectTimer = setInterval(() => {
          secs -= 1;
          const winnerText = winner ? `🏆 ${winner.name} WINS!` : '🏆 Game Over!';
          banner.textContent = `${winnerText} Returning to home in ${secs}s…`;
          if (secs <= 0) {
            clearInterval(gameOverRedirectTimer);
            gameOverRedirectTimer = null;
            location.href = '/';
          }
        }, 1000);
      }
    } else {
      banner.style.display = 'none';
      document.getElementById('qr-panel').classList.remove('hidden');
      const current = state.players.find(p => p.id === state.currentPlayerId);
      const dartsLeft = 3 - (state.dartsThrown || 0);
      document.getElementById('turn-indicator').textContent =
        current ? `${current.name}'s turn — ${dartsLeft} dart${dartsLeft !== 1 ? 's' : ''} left` : '';
    }

    // Scoreboard
    const targets = state.targets;
    const players = state.players;

    let html = `
      <div class="scoreboard-wrapper">
        <table>
          <thead>
            <tr>
              <th class="target-col">Target</th>
              ${players.map(p => `
                <th class="player-header">
                  ${esc(p.name)}
                  ${p.id === state.currentPlayerId ? '<span class="current-turn-badge">▶ Turn</span>' : ''}
                </th>
              `).join('')}
            </tr>
          </thead>
          <tbody>
            ${targets.map(t => `
              <tr>
                <td class="target-col">${t === 25 ? 'BULL' : t}</td>
                ${players.map(p => {
                  const marks = p.marks[t] || 0;
                  const closed = marks >= 3;
                  return `<td class="marks-cell ${closed ? 'closed' : ''}">${marksSymbol(marks)}</td>`;
                }).join('')}
              </tr>
            `).join('')}
            <tr class="score-row">
              <td class="target-col"><span class="score-label">Score</span></td>
              ${players.map(p => `<td><span class="score-value">${p.score}</span></td>`).join('')}
            </tr>
          </tbody>
        </table>
      </div>
    `;

    document.getElementById('main-content').innerHTML = html;

    // Throw feed – show current turn throws + last 2 completed turns
    renderFeed(state);
  }

  function renderFeed(state) {
    const feed = document.getElementById('throw-feed');
    const items = [];

    // Current turn throws
    if (state.currentTurnThrows && state.currentTurnThrows.length > 0) {
      const current = state.players.find(p => p.id === state.currentPlayerId);
      state.currentTurnThrows.forEach(t => {
        items.push(chipHtml(current?.name || '?', t));
      });
    }

    // Last completed turn
    const history = state.turnHistory || [];
    const lastTurns = history.slice(-2).reverse();
    lastTurns.forEach(turn => {
      turn.throws.forEach(t => {
        items.push(chipHtml(turn.playerName, t));
      });
    });

    feed.innerHTML = items.length ? items.join('') : '<span style="color:#555">—</span>';
  }

  function chipHtml(playerName, throwData) {
    const { target, multiplier, result } = throwData;
    if (result.miss || target === 0) {
      return `<span class="throw-chip miss">❌ ${esc(playerName)} missed</span>`;
    }
    const label = target === 25 ? 'Bull' : target;
    const mul = multiplier === 3 ? 'T' : multiplier === 2 ? 'D' : 'S';
    const hasScore = result.pointsAdded && Object.keys(result.pointsAdded).length > 0;
    return `<span class="throw-chip ${hasScore ? 'score' : ''}">${mul}${label} – ${esc(playerName)}</span>`;
  }

  function marksSymbol(marks) {
    if (marks === 0) return '';
    if (marks === 1) return '/';
    if (marks === 2) return 'X';
    return '✓'; // 3 = closed
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
